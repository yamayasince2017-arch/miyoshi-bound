<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIYOSHI BOUND</title>
  <meta name="description" content="A curated platform for artisans and producers of Miyoshi, Tokushima.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    html, body { overflow: hidden; height: 100%; }
    /* 背景をオフホワイトに上書き */
    .hero { background: var(--bg) !important; }
    .hero__overlay { background: transparent !important; }
    .hero__content { color: var(--ink) !important; }
    .hero__eyebrow { color: var(--ink-muted) !important; opacity: 1 !important; }
    .hero__title { color: var(--ink) !important; }
    .hero__subtitle { color: var(--ink-light) !important; opacity: 1 !important; }
    .hero__nav a { color: var(--ink) !important; opacity: 0.6 !important; }
    .hero__nav a:hover { opacity: 1 !important; border-bottom-color: var(--ink) !important; }
    .hero__footer { color: var(--ink-muted) !important; opacity: 0.5 !important; }
    /* ナビを中央揃えに */
    .hero__nav { justify-content: center !important; }

    /* Entrance animation */
    .hero__content > * {
      opacity: 0;
      transform: translateY(14px);
      animation: fadeUp 1.1s ease forwards;
    }
    .hero__eyebrow  { animation-delay: 0.3s; }
    .hero__title    { animation-delay: 0.6s; }
    .hero__subtitle { animation-delay: 0.9s; }
    .hero__nav      { animation-delay: 1.2s; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <section class="hero">
    <!-- 背景画像: /images/hero.jpg に差し替えてください -->
    <div class="hero__overlay"></div>

    <div class="hero__content">
      <p class="hero__eyebrow">Tokushima, Japan</p>
      <h1 class="hero__title">MIYOSHI<br>BOUND</h1>
      <p class="hero__subtitle">Where mountain rivers carve stories into craft, flavor, and land.</p>
      <nav>
        <ul class="hero__nav">
          <li><a href="index-catalog.html">Catalog</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>

    <p class="hero__footer">MIYOSHI BOUND — Est. 2024</p>
  </section>

  <script src="js/tracking.js"></script>
  <script>
    MiyoshiTrack.send({ shop: 'index', type: 'view' });
  </script>
</body>
</html>
